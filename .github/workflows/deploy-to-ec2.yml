name: Deploy StudyBuddy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            #!/bin/bash
            set -e
            
            echo "========================================="
            echo "🚀 Starting StudyBuddy Deployment"
            echo "========================================="
            echo "Time: $(date)"
            echo "User: $(whoami)"
            
            # Configuration
            APP_DIR="/home/ubuntu/studybuddy"
            VENV_DIR="/home/ubuntu/studybuddy/venv"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
            
            echo ""
            echo "📦 Deployment Configuration:"
            echo "  - App Directory: $APP_DIR"
            echo "  - Repository: $REPO_URL"
            echo "  - Branch: $BRANCH"
            echo "  - Commit: ${{ github.sha }}"
            echo ""
            
            # Go to app directory
            cd "$APP_DIR"
            
            # Pull latest code
            echo "🔄 Pulling latest changes..."
            git fetch origin
            git reset --hard "origin/$BRANCH"
            git clean -fd
            
            echo ""
            echo "========================================="
            echo "🔧 Backend Deployment"
            echo "========================================="
            
            cd "$APP_DIR/backend"
            
            # Activate virtual environment and install dependencies
            echo "📦 Installing Python dependencies..."
            source "$VENV_DIR/bin/activate"
            grep -v "emergentintegrations" requirements.txt > requirements_ec2.txt
            pip install -q -r requirements_ec2.txt
            
            # Restart backend service
            echo "🔄 Restarting backend service..."
            sudo systemctl restart studybuddy-backend
            sleep 5
            
            # Check backend status
            if sudo systemctl is-active --quiet studybuddy-backend; then
              echo "✅ Backend service is running"
            else
              echo "❌ Backend service failed to start"
              sudo journalctl -u studybuddy-backend -n 50 --no-pager
              exit 1
            fi
            
            # Test API
            echo "🧪 Testing API..."
            curl -f http://localhost:8001/api/ || exit 1
            echo "✅ API is responding"
            
            echo ""
            echo "========================================="
            echo "🎨 Frontend Deployment"
            echo "========================================="
            
            cd "$APP_DIR/frontend"
            
            # Install Node dependencies
            echo "📦 Installing Node dependencies..."
            yarn install --frozen-lockfile
            
            # Build frontend
            echo "🔨 Building frontend..."
            yarn build
            
            # Deploy to web root
            echo "📋 Deploying to web root..."
            sudo mkdir -p /var/www/studybuddy
            sudo cp -r build/* /var/www/studybuddy/
            
            # Reload Nginx
            echo "🔄 Reloading Nginx..."
            
            # Fix Nginx upload limit (for file uploads)
            echo "🔧 Ensuring Nginx upload limit is set..."
            if ! grep -q "client_max_body_size.*100M" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a \    client_max_body_size 100M;' /etc/nginx/nginx.conf
              echo "✅ Set client_max_body_size to 100M"
            else
              echo "✅ Upload limit already configured"
            fi
            
            sudo systemctl reload nginx
            
            # Check Nginx status
            if sudo systemctl is-active --quiet nginx; then
              echo "✅ Nginx is running"
            else
              echo "❌ Nginx failed"
              sudo systemctl status nginx --no-pager
              exit 1
            fi
            
            echo ""
            echo "========================================="
            echo "✅ Deployment Completed Successfully!"
            echo "========================================="
            echo "Time: $(date)"
            echo ""
            echo "🔍 Service Status:"
            sudo systemctl status studybuddy-backend --no-pager -l | head -10
            echo ""
            echo "🌐 Application should be available at http://13.201.25.124"
            echo "========================================="

      - name: Deployment Status
        if: success()
        run: |
          echo "✅ Deployment to EC2 completed successfully!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Deployed by: ${{ github.actor }}"
      
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above for errors."
          exit 1
