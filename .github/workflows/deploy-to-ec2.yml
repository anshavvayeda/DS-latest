name: Deploy StudyBuddy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            #!/bin/bash
            set -e
            
            echo "========================================="
            echo "🚀 Starting StudyBuddy Deployment"
            echo "========================================="
            echo "Time: $(date)"
            echo "User: $(whoami)"
            
            # Configuration
            APP_DIR="/home/ubuntu/studybuddy"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
            
            echo ""
            echo "📦 Deployment Configuration:"
            echo "  - App Directory: $APP_DIR"
            echo "  - Repository: $REPO_URL"
            echo "  - Branch: $BRANCH"
            echo "  - Commit: ${{ github.sha }}"
            echo ""
            
            # Create app directory if it doesn't exist
            if [ ! -d "$APP_DIR" ]; then
              echo "📁 Creating app directory..."
              mkdir -p "$APP_DIR"
            fi
            
            cd "$APP_DIR"
            
            # Clone or pull latest code
            if [ ! -d ".git" ]; then
              echo "📥 Cloning repository..."
              git clone "$REPO_URL" .
              git checkout "$BRANCH"
            else
              echo "🔄 Pulling latest changes..."
              git fetch origin
              git reset --hard "origin/$BRANCH"
              git clean -fd
            fi
            
            echo ""
            echo "========================================="
            echo "🔧 Backend Deployment"
            echo "========================================="
            
            # Backend deployment
            cd "$APP_DIR/backend"
            
            # Create/preserve .env file
            if [ ! -f ".env" ]; then
              echo "⚠️  Backend .env not found - creating from template"
              cat > .env << 'ENVEOF'
            # PostgreSQL Database
            DATABASE_URL=postgresql+asyncpg://postgres:PASSWORD@HOST:5432/postgres
            
            # Authentication
            MOCK_OTP_MODE=true
            MOCK_OTP_VALUE=123456
            JWT_SECRET=your-secret-key-here
            JWT_ALGORITHM=HS256
            JWT_EXPIRATION_HOURS=24
            
            # OpenRouter API Key
            OPENROUTER_API_KEY=your-openrouter-key-here
            
            # AWS S3 Storage
            AWS_ACCESS_KEY_ID=your-aws-key
            AWS_SECRET_ACCESS_KEY=your-aws-secret
            S3_BUCKET_NAME=your-bucket-name
            AWS_REGION=ap-south-1
            
            # Admin Credentials
            ADMIN_USERNAME=admin
            ADMIN_PASSWORD=Admin@123
            ENV=production
            ENVEOF
              echo "⚠️  Please update backend/.env with actual credentials!"
            else
              echo "✅ Backend .env exists"
            fi
            
            # Install Python dependencies
            echo "📦 Installing Python dependencies..."
            pip3 install -q -r requirements.txt
            
            # Stop backend service
            echo "🛑 Stopping backend service..."
            sudo systemctl stop studybuddy-backend 2>/dev/null || echo "Service not running"
            
            # Start backend service
            echo "▶️  Starting backend service..."
            sudo systemctl start studybuddy-backend
            sleep 3
            
            # Check backend status
            if sudo systemctl is-active --quiet studybuddy-backend; then
              echo "✅ Backend service is running"
            else
              echo "❌ Backend service failed to start"
              sudo journalctl -u studybuddy-backend -n 20 --no-pager
              exit 1
            fi
            
            echo ""
            echo "========================================="
            echo "🎨 Frontend Deployment"
            echo "========================================="
            
            # Frontend deployment
            cd "$APP_DIR/frontend"
            
            # Create/preserve .env file
            if [ ! -f ".env" ]; then
              echo "⚠️  Frontend .env not found - creating template"
              cat > .env << 'ENVEOF'
            REACT_APP_BACKEND_URL=https://your-domain.com
            ENVEOF
              echo "⚠️  Please update frontend/.env with actual backend URL!"
            else
              echo "✅ Frontend .env exists"
            fi
            
            # Install Node dependencies
            echo "📦 Installing Node dependencies..."
            yarn install --frozen-lockfile
            
            # Build frontend
            echo "🔨 Building frontend..."
            yarn build
            
            # Deploy to web root
            echo "📋 Deploying to web root..."
            sudo mkdir -p /var/www/studybuddy
            sudo cp -r build/* /var/www/studybuddy/
            
            # Reload Nginx
            echo "🔄 Reloading Nginx..."
            sudo systemctl reload nginx
            
            # Check Nginx status
            if sudo systemctl is-active --quiet nginx; then
              echo "✅ Nginx is running"
            else
              echo "❌ Nginx failed"
              exit 1
            fi
            
            echo ""
            echo "========================================="
            echo "✅ Deployment Completed Successfully!"
            echo "========================================="
            echo "Time: $(date)"
            echo ""
            echo "🔍 Service Status:"
            sudo systemctl status studybuddy-backend --no-pager -l | head -10
            echo ""
            echo "🌐 Application should be available at your domain"
            echo "========================================="

      - name: Deployment Status
        if: success()
        run: |
          echo "✅ Deployment to EC2 completed successfully!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Deployed by: ${{ github.actor }}"
      
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above for errors."
          exit 1
