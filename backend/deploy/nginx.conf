# =============================================================================
# Nginx Configuration for StudyBuddy Backend
# =============================================================================
# Place this file at: /etc/nginx/sites-available/studybuddy
# Enable with: sudo ln -s /etc/nginx/sites-available/studybuddy /etc/nginx/sites-enabled/
# Test with: sudo nginx -t
# Reload with: sudo systemctl reload nginx
# =============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Upstream backend
upstream studybuddy_backend {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 32;
}

# HTTP Server (redirect to HTTPS in production)
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # For Let's Encrypt certificate verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;

    # API Proxy (for HTTP-only setup during initial deployment)
    location / {
        proxy_pass http://studybuddy_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Rate limiting for API
        limit_req zone=api_limit burst=20 nodelay;
    }

    # Stricter rate limiting for auth endpoints
    location ~ ^/api/(auth|admin/login) {
        proxy_pass http://studybuddy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        limit_req zone=login_limit burst=5 nodelay;
    }

    # Health check endpoint (no rate limiting)
    location = /health {
        proxy_pass http://studybuddy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/css
        text/javascript
        text/plain
        text/xml;

    # Client settings
    client_max_body_size 30M;
    client_body_buffer_size 128k;

    # Logging
    access_log /var/log/nginx/studybuddy_access.log;
    error_log /var/log/nginx/studybuddy_error.log;
}

